name: Build and Publish

on:
  workflow_dispatch:   # manual trigger only

jobs:
  # -----------------------------------------------------------------------
  # Build binary wheels (one job per OS, cibuildwheel handles arch matrix)
  # -----------------------------------------------------------------------
  build_wheels:
    name: Wheels — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      # Linux arm64 cross-compilation uses QEMU
      - name: Set up QEMU (Linux only)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4
        # Configuration is read from [tool.cibuildwheel] in pyproject.toml

      - uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # -----------------------------------------------------------------------
  # Build source distribution (sdist) — lets users build on unsupported platforms
  # -----------------------------------------------------------------------
  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install build
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist

      - uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: dist/*.tar.gz

  # -----------------------------------------------------------------------
  # Publish to PyPI — only on version tags, uses OIDC trusted publishing.
  #
  # One-time setup on PyPI:
  #   1. Go to https://pypi.org/manage/account/publishing/
  #   2. Add a "pending publisher": owner=YOUR_USERNAME, repo=procmon-reader,
  #      workflow=build_and_publish.yml, environment=pypi
  # -----------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/procmon-reader

    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - uses: actions/download-artifact@v5
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
